name: Sharp9110 flash ingest

# Sharp9110 (公衆衛生通報情報) を 1 分間隔で polling する高頻度ジョブ。
# 単一 API 呼び出しで全国分が取れる軽量ソースなので、新着があれば
# 即時 sightings.json に追加・コミットできる。
#
# repo public 化後は GitHub Actions が無制限・無料で使えるため、
# 限界まで詰めて 1 分間隔運用とする。

on:
  schedule:
    # 毎分実行。GitHub Actions の cron 最小粒度。
    - cron: '* * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

# sightings.json への書き込みを refresh-sightings / news-flash と
# 直列化することで push 衝突を防ぐ。同じ group "sightings-write" に統一。
concurrency:
  group: sightings-write
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --prefer-offline --no-audit

      - name: Ingest Sharp9110
        run: npm run ingest:sharp9110

      - name: Commit and push (with rebase retry)
        run: |
          if git diff --quiet public/data/sightings.json; then
            echo "No new Sharp9110 records — skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 同名 concurrency group があっても、ローカル push や別ワークフローと
          # 短時間 race することがある。コンフリクト時は ingest を再実行して退避。
          for attempt in 1 2 3; do
            git add public/data/sightings.json
            git commit -m "Sharp9110 flash: ingest fresh records ($(date -u +%Y-%m-%dT%H:%M))" || true
            git fetch origin main
            if git rebase origin/main; then
              if git push; then
                exit 0
              fi
            else
              git rebase --abort || true
            fi
            echo "[sharp9110] push/rebase failed (attempt $attempt) — re-running ingest"
            git reset --hard origin/main
            npm run ingest:sharp9110
            if git diff --quiet public/data/sightings.json; then
              echo "No new records after re-ingest — done"
              exit 0
            fi
            sleep 3
          done
          echo "Failed after 3 attempts"
          exit 1
