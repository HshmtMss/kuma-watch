name: News flash ingest

# Google News RSS から最新クマ関連ニュースを 1 時間ごとに取り込む高頻度ジョブ。
# 67 自治体ソースを集約する refresh-sightings (1 日 2 回・1 回 20 分) と分離し、
# こちらは数分で終わる軽量フローに保つことで、報道速報レベルの鮮度
# (発生 → 反映が概ね 1 時間以内) を実現する。
#
# private repo の Actions 無料枠 (2,000 min/月) 内に収めるため、
# 1 回 1〜2 分・1 時間ごと = 月 1,500 min 弱を上限とする。
# refresh-sightings.yml (月 1,200 min) と合わせると合計 ~2,700 min。
# 超過リスクが出てきたら repo を public 化するか、頻度を 2h に落とす。

on:
  schedule:
    # 5 分間隔。URL 重複キャッシュにより既処理記事は Gemini を呼ばずに
    # 即終了するため、5 分間隔でも実質コストは無新着時はゼロ近い。
    # repo public 化後は Actions 無制限なので積極的に詰める。
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

# sightings.json への書き込みを refresh-sightings / sharp9110-flash と
# 直列化することで push 衝突を防ぐ。同じ group "sightings-write" に統一。
concurrency:
  group: sightings-write
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --prefer-offline --no-audit

      - name: Ingest news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run ingest:news

      - name: Commit and push (with rebase retry)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if git diff --quiet public/data/sightings.json; then
            echo "No new news records — skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # concurrency group があっても、ローカルからの code push や別ワークフロー
          # の git push と race することがある。コンフリクト時は origin/main に
          # 戻して ingest を再実行 (dedup により Gemini コストは最小限) → push。
          for attempt in 1 2 3; do
            git add public/data/sightings.json
            git commit -m "News flash: ingest fresh news ($(date -u +%Y-%m-%dT%H:%M))" || true
            git fetch origin main
            if git rebase origin/main; then
              if git push; then
                exit 0
              fi
            else
              git rebase --abort || true
            fi
            echo "[news-flash] push/rebase failed (attempt $attempt) — re-running ingest"
            git reset --hard origin/main
            npm run ingest:news
            if git diff --quiet public/data/sightings.json; then
              echo "No new records after re-ingest — done"
              exit 0
            fi
            sleep 3
          done
          echo "Failed after 3 attempts"
          exit 1
