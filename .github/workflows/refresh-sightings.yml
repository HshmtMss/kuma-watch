name: Refresh sightings data

# 1日 2 回 67 自治体ソース + Sharp9110 を集約し、差分があれば
# public/data/sightings.json を更新コミットして Vercel の自動デプロイをトリガーする。
#
# 手動実行は GitHub UI の "Run workflow" ボタンから可能。

on:
  schedule:
    # 4 時間間隔 (1日 6 回)。public repo 化により Actions 無制限なので
    # 各時間帯の自治体掲載をカバー。
    # UTC 18:00 = JST 03:00 / UTC 22:00 = JST 07:00 / UTC 02:00 = JST 11:00 /
    # UTC 06:00 = JST 15:00 / UTC 10:00 = JST 19:00 / UTC 14:00 = JST 23:00
    # 自治体側サーバー負荷を考えても、6x/日は許容範囲。
    - cron: '0 */4 * * *'
  workflow_dispatch: {}

# git push に必要
permissions:
  contents: write

# sightings.json への書き込みを直列化。news-flash / sharp9110-flash と
# 同じグループ "sightings-write" にすることで、refresh-sightings の 20 分
# 実行中に他ジョブが新規コミットを入れて push 衝突 → 失敗する事故を防ぐ。
concurrency:
  group: sightings-write
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # CI runner (US) から日本の 67 自治体サイトを叩くため、ローカル (~4分)
    # より相当遅くなる。LLM 抽出 (Gemini) も含めると 15 分では足りないので
    # 30 分まで許容する。GitHub Actions 無料枠 (private 2,000 分/月) には十分余裕。
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Aggregate sightings
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KEMONOTE_USERNAME: ${{ secrets.KEMONOTE_USERNAME }}
          KEMONOTE_PASSWORD: ${{ secrets.KEMONOTE_PASSWORD }}
        run: npm run build:sightings

      - name: Commit if changed
        run: |
          if git diff --quiet public/data/sightings.json; then
            echo "No changes — skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/sightings.json
          git commit -m "Refresh sightings data ($(date -u +%Y-%m-%d))"
          # 防御的 rebase。concurrency group で直列化はされているが、
          # 万一の race を耐えるため push 前に最新を取り込む。
          # 我々の commit が「全件再生成」なので衝突したら ours で上書き。
          git pull --rebase -X ours origin main
          git push
