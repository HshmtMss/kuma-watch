name: Refresh sightings data

# 1日 2 回 67 自治体ソース + Sharp9110 を集約し、差分があれば
# public/data/sightings.json を更新コミットして Vercel の自動デプロイをトリガーする。
#
# 手動実行は GitHub UI の "Run workflow" ボタンから可能。

on:
  schedule:
    # 1日 2 回。朝の登山・通学前と夕方の翌日プラン時にデータ反映を間に合わせる。
    # UTC 18:00 = JST 03:00 (早朝バッチ・深夜帯で自治体側負荷を最小化)
    # UTC 06:00 = JST 15:00 (午後バッチ・当日の昼前掲載分を取り込む)
    # 1 run ≒ 20 min × 2 回/日 ≒ 1,200 min/月、private repo の Actions
    # 無料枠 (2,000 min) の範囲内。さらに高頻度化したい場合は repo を
    # public にすれば Actions 分数は実質無制限。
    - cron: '0 6,18 * * *'
  workflow_dispatch: {}

# git push に必要
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    # CI runner (US) から日本の 67 自治体サイトを叩くため、ローカル (~4分)
    # より相当遅くなる。LLM 抽出 (Gemini) も含めると 15 分では足りないので
    # 30 分まで許容する。GitHub Actions 無料枠 (private 2,000 分/月) には十分余裕。
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Aggregate sightings
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KEMONOTE_USERNAME: ${{ secrets.KEMONOTE_USERNAME }}
          KEMONOTE_PASSWORD: ${{ secrets.KEMONOTE_PASSWORD }}
        run: npm run build:sightings

      - name: Commit if changed
        run: |
          if git diff --quiet public/data/sightings.json; then
            echo "No changes — skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/sightings.json
          git commit -m "Refresh sightings data ($(date -u +%Y-%m-%d))"
          git push
